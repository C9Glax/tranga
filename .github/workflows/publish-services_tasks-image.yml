name: Build and publish Tasks-Service Image
on:

  # publish on releases, e.g. v2.1.13 (image tagged as "2.1.13" - "v" prefix is removed)
  release:
    types: [ published, push ]

  # publish on pushes to the main branch (image tagged as "latest")
  push:
    branches:
      - external-connectors

jobs:
  docker_publish:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v2

      # https://github.com/marketplace/actions/push-to-ghcr
      - name: Build and publish a Docker image for ${{ github.repository }}
        uses: macbre/push-to-ghcr@master
        with:
          image_name: ${{ github.repository }}-services_tasks  # it will be lowercased internally
          dockerfile: ./Services.Tasks/Dockerfile
          context: ./Services.Tasks
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          github_token: ${{ secrets.GITHUB_TOKEN }}
          image_tag: external-connectors
          # optionally push to the Docker Hub (docker.io)
          # docker_io_token: ${{ secrets.DOCKER_IO_ACCESS_TOKEN }}  # see https://hub.docker.com/settings/security
          # customize the username to be used when pushing to the Docker Hub
          # docker_io_user: foobar  # see https://github.com/macbre/push-to-ghcr/issues/14