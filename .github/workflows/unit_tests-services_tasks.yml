name: Tasks Service Unit Tests

on:
  push:
    branches:
      - external-connectors
    paths:
      - "Common/**"
      - "Common.Database/**"
      - "Extensions/**"
      - "NSwagClients"
      - "Services.Tasks/**"
      - "Services.Tasks.Tests/**"
      - ".github/workflows/unit_tests-services_tasks.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - name: Restore dependencies
        run: dotnet restore ./Services.Tasks.Tests/Services.Tasks.Tests.csproj
      - name: Build the solution
        run: dotnet build ./Services.Tasks.Tests/Services.Tasks.Tests.csproj --configuration Release --no-restore
      - name: Run unit tests with report
        run: dotnet test ./Services.Tasks.Tests/Services.Tasks.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"
      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: TestResults
          path: ./Tests/TestResults/TestResults.trx