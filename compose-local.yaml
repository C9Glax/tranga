services:
  application:
    image: application
    container_name: tranga-app
    build:
      context: Application
      dockerfile: Dockerfile
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
    ports:
      - "8080:8080"
  frontend:
    image: frontend
    container_name: tranga-frontend
    build:
      context: Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
  tranga-pg:
    image: postgres
    container_name: tranga-pg
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-U", "postgres" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

